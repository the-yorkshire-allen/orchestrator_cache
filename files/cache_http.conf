# ----- HTTP-LEVEL CACHE CONFIG -----
proxy_cache_path /var/cache/nginx/pe_api_cache
                 keys_zone=pe_api_cache:64m
                 max_size=5g
                 inactive=30m
                 levels=1:2;

# ----- INJECT LOCATION BLOCK INTO SERVER CONTEXT -----
# We cannot define the location block here directly, because this file is loaded
# inside http{} and *not* inside server{}.
#
# Instead, we instruct NGINX (via pe_nginx::directive) to include a second file
# containing the actual location directives inside the real server block
# (defined in PE-managed proxy.conf):
#
# include cache_location_snippet.conf;